services:
  pg-photography:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_photography}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payload}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify

  app:
    image: ghcr.io/dettinjo/portfolio-photography:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - NODE_ENV=production
      - POSTGRES_URL=postgres://${POSTGRES_USER:-payload}:${POSTGRES_PASSWORD}@pg-photography:5432/${POSTGRES_DB:-portfolio_photography}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER}
      - NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD}
    volumes:
      - /mnt/storagebox/portfolio-media/photography:/app/public/media
    depends_on:
      pg-photography:
        condition: service_healthy
    networks:
      - coolify
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-0-csk4kwoogkg0ccg0gs48wkog.entryPoints=http"
      - "traefik.http.routers.http-0-csk4kwoogkg0ccg0gs48wkog.middlewares=redirect-to-https"
      - "traefik.http.routers.http-0-csk4kwoogkg0ccg0gs48wkog.rule=Host(`photosby.joeldettinger.de`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-0-csk4kwoogkg0ccg0gs48wkog.service=http-0-csk4kwoogkg0ccg0gs48wkog"
      - "traefik.http.routers.https-0-csk4kwoogkg0ccg0gs48wkog.entryPoints=https"
      - "traefik.http.routers.https-0-csk4kwoogkg0ccg0gs48wkog.middlewares=gzip"
      - "traefik.http.routers.https-0-csk4kwoogkg0ccg0gs48wkog.rule=Host(`photosby.joeldettinger.de`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-0-csk4kwoogkg0ccg0gs48wkog.service=https-0-csk4kwoogkg0ccg0gs48wkog"
      - "traefik.http.routers.https-0-csk4kwoogkg0ccg0gs48wkog.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-0-csk4kwoogkg0ccg0gs48wkog.tls=true"
      - "traefik.http.services.http-0-csk4kwoogkg0ccg0gs48wkog.loadbalancer.server.port=3000"
      - "traefik.http.services.https-0-csk4kwoogkg0ccg0gs48wkog.loadbalancer.server.port=3000"

volumes:
  postgres_data:

networks:
  coolify:
    external: true
