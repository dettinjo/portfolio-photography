services:
  # Service is named "pg-photography" (not the generic "postgres") to avoid
  # a Docker DNS collision with Coolify's own "coolify-db" container, which
  # registers the alias "postgres" on the shared coolify network.
  pg-photography:
    image: postgres:17-alpine
    container_name: portfolio-photography-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_photography}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payload}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-photography-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - POSTGRES_URL=postgres://${POSTGRES_USER:-payload}:${POSTGRES_PASSWORD:-password}@pg-photography:5432/${POSTGRES_DB:-portfolio_photography}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER}
      - NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD}
      - NEXT_PUBLIC_FULL_NAME=${NEXT_PUBLIC_FULL_NAME}
      - NEXT_PUBLIC_INSTAGRAM_USERNAME=${NEXT_PUBLIC_INSTAGRAM_USERNAME}
      - NEXT_PUBLIC_LINKEDIN_USERNAME=${NEXT_PUBLIC_LINKEDIN_USERNAME}
      - NEXT_PUBLIC_PHOTOGRAPHY_DOMAIN=${NEXT_PUBLIC_PHOTOGRAPHY_DOMAIN}
      - IMAGE_CACHE_DIR=/app/cache
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
    volumes:
      - media:/app/public/media
      - webp-cache:/app/cache
    depends_on:
      pg-photography:
        condition: service_healthy
    env_file:
      - .env.local

volumes:
  postgres_data:
  media:
  webp-cache:
