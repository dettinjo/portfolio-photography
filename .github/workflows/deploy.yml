name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            NEXT_PUBLIC_FULL_NAME=Joel Dettinger
            NEXT_PUBLIC_LINKEDIN_USERNAME=joeldettinger
            NEXT_PUBLIC_INSTAGRAM_USERNAME=joeldettinger
            NEXT_PUBLIC_PHOTOGRAPHY_DOMAIN=photosby.joeldettinger.de
            NEXT_PUBLIC_CMS_URL=https://cms.joeldettinger.de
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        run: |
          curl -fsSL "${{ secrets.COOLIFY_WEBHOOK_URL }}"
