name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            NEXT_PUBLIC_FULL_NAME=Joel Dettinger
            NEXT_PUBLIC_LINKEDIN_USERNAME=joeldettinger
            NEXT_PUBLIC_INSTAGRAM_USERNAME=joeldettinger
            NEXT_PUBLIC_PHOTOGRAPHY_DOMAIN=photosby.joeldettinger.de
            NEXT_PUBLIC_CMS_URL=https://cms.joeldettinger.de
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          cache-from: type=gha,scope=photography
          cache-to: type=gha,mode=max,scope=photography

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.98.81.231
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          script: |
            # Pull latest image and retag for local compose reference
            docker pull ghcr.io/dettinjo/portfolio-photography:latest
            docker tag ghcr.io/dettinjo/portfolio-photography:latest my-portfolio-photography
            # Deploy using stable compose file (not Coolify ephemeral artifacts)
            cd /data/coolify/applications/csk4kwoogkg0ccg0gs48wkog
            docker compose -p csk4kwoogkg0ccg0gs48wkog -f docker-compose.prod.yml up -d --no-build
